<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://fastly.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <title>관리자 - 펀드 심사 · 두띵</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="main.css">
  <script src="api.js"></script>
  <script src="categories.js"></script>
  <script src="notification.js"></script>
  <script src="search.js"></script>
  <script src="category-icons.js"></script>
  <script src="main.js"></script>
  <script src="admin.js" defer></script>
</head>
<body class="main-page" data-page="sub">
  <div id="app"></div>
  <main class="main-content" style="max-width:1000px;padding:24px 20px 80px;">
    <h1 style="font-size:24px;font-weight:800;margin-bottom:16px;">관리자 콘솔</h1>

    <!-- 상위 뷰 전환 -->
    <div id="adminViews" style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;border-bottom:1px solid #eee;padding-bottom:16px;">
      <button class="admin-view" data-view="funds">펀드 심사</button>
      <button class="admin-view" data-view="deposits">입금 확인</button>
      <button class="admin-view" data-view="deletes">삭제 요청</button>
      <button class="admin-view" data-view="users">사용자 관리</button>
    </div>

    <!-- 펀드 심사 -->
    <section id="viewFunds">
      <p style="color:#6b7280;font-size:14px;margin-bottom:16px;">새로 올라온 펀드를 검토하고 공개를 승인하거나 반려합니다.</p>
      <div id="adminTabs" style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;">
        <button class="admin-tab" data-status="pending">심사 대기</button>
        <button class="admin-tab" data-status="open">공개됨</button>
        <button class="admin-tab" data-status="rejected">반려됨</button>
      </div>
      <div id="adminFundList"></div>
    </section>

    <!-- 입금 확인 -->
    <section id="viewDeposits" style="display:none;">
      <p style="color:#6b7280;font-size:14px;margin-bottom:16px;">후원자가 입금한 건을 입금자명·금액으로 대조해 확인하면 후원이 확정됩니다.</p>
      <div id="depositTabs" style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;">
        <button class="deposit-tab" data-status="awaiting_deposit">입금 대기</button>
        <button class="deposit-tab" data-status="confirmed">확인 완료</button>
      </div>
      <div id="adminDepositList"></div>
    </section>

    <!-- 삭제 요청 -->
    <section id="viewDeletes" style="display:none;">
      <p style="color:#6b7280;font-size:14px;margin-bottom:16px;">작성자가 삭제를 요청한 펀드입니다. 삭제 처리 시 펀드는 취소되고 모든 후원이 취소됩니다(입금 완료 건은 환불 대상으로 안내됩니다).</p>
      <div id="adminDeleteList"></div>
    </section>

    <!-- 사용자 관리 -->
    <section id="viewUsers" style="display:none;">
      <p style="color:#6b7280;font-size:14px;margin-bottom:16px;">가입한 사용자 목록과 권한을 관리합니다.</p>
      <input id="userSearch" type="text" placeholder="이메일·이름 검색" style="width:100%;max-width:320px;padding:10px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14px;margin-bottom:16px;">
      <div id="adminUserList"></div>
    </section>
  </main>
</body>
</html>
