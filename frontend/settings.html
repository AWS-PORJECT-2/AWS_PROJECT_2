<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>설정 · 두띵</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="main.css">
  <link rel="stylesheet" href="settings.css">
  <script src="api.js"></script>
  <script src="categories.js"></script>
  <script src="notification.js"></script>
  <script src="search.js"></script>
  <script src="category-icons.js"></script>
  <script src="main.js"></script>
  <script src="settings.js" defer></script>
</head>
<body class="main-page" data-page="sub">
  <div id="app"></div>

  <main class="set-page dt-wrap">
    <h1 class="set-page__title">설정</h1>

    <div class="set-tabs" id="setTabs" role="tablist">
      <button class="set-tab is-active" data-tab="profile" role="tab">프로필</button>
      <button class="set-tab" data-tab="account" role="tab">계정</button>
      <button class="set-tab" data-tab="payment" role="tab">결제수단</button>
      <button class="set-tab" data-tab="address" role="tab">배송지</button>
      <button class="set-tab" data-tab="noti" role="tab">알림</button>
    </div>

    <section id="setProfile" class="set-pane"></section>
    <section id="setAccount" class="set-pane" hidden></section>
    <section id="setPayment" class="set-pane" hidden></section>
    <section id="setAddress" class="set-pane" hidden></section>
    <section id="setNoti" class="set-pane" hidden></section>
  </main>
</body>
</html>
