<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 활동 - 국민대학교</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== 데스크톱 사이드바 ===== -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">🎓</span>
      <span class="logo-text">국민대학교</span>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="sidebar-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h1v7c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-7h1a1 1 0 00.7-1.7l-9-9a1 1 0 00-1.4 0l-9 9A1 1 0 003 13z"/></svg>
        <span>홈</span>
      </a>
      <a href="feed.html" class="sidebar-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        <span>공동구매</span>
      </a>
      <a href="#" class="sidebar-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span>알림</span>
      </a>
    </nav>
    <div class="sidebar-bottom">
      <a href="mypage.html" class="sidebar-item active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>마이페이지</span>
      </a>
    </div>
  </aside>

  <!-- ===== 메인 콘텐츠 ===== -->
  <main class="main-content" style="padding-bottom:80px;">

    <!-- 모바일 헤더 -->
    <header class="header mobile-only">
      <div class="header-left">
        <span class="school-name">나의 활동</span>
      </div>
      <div class="header-right">
        <button class="icon-btn" aria-label="검색" onclick="openSearch()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        </button>
        <button class="icon-btn" aria-label="설정" onclick="location.href='settings.html'">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 00-2 2v.18a2 2 0 01-1 1.73l-.43.25a2 2 0 01-2 0l-.15-.08a2 2 0 00-2.73.73l-.22.38a2 2 0 00.73 2.73l.15.1a2 2 0 011 1.72v.51a2 2 0 01-1 1.74l-.15.09a2 2 0 00-.73 2.73l.22.38a2 2 0 002.73.73l.15-.08a2 2 0 012 0l.43.25a2 2 0 011 1.73V20a2 2 0 002 2h.44a2 2 0 002-2v-.18a2 2 0 011-1.73l.43-.25a2 2 0 012 0l.15.08a2 2 0 002.73-.73l.22-.39a2 2 0 00-.73-2.73l-.15-.08a2 2 0 01-1-1.74v-.5a2 2 0 011-1.74l.15-.09a2 2 0 00.73-2.73l-.22-.38a2 2 0 00-2.73-.73l-.15.08a2 2 0 01-2 0l-.43-.25a2 2 0 01-1-1.73V4a2 2 0 00-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </header>

    <!-- 데스크톱 상단바 -->
    <header class="desktop-topbar desktop-only">
      <h1 style="font-size:22px;font-weight:700;color:#1a1a1a;">나의 활동</h1>
      <div class="topbar-right">
        <div class="topbar-profile">
          <img src="https://picsum.photos/seed/profile1/36/36" alt="프로필" class="topbar-avatar">
        </div>
      </div>
    </header>

    <!-- 탭 영역 -->
    <div id="tabContainer" style="display:flex;border-bottom:1px solid #f0f0f0;position:sticky;top:0;background:#fff;z-index:50;">
      <button id="tabLiked" onclick="switchTab('liked')" style="flex:1;padding:14px 0;font-size:14px;font-weight:600;border:none;background:none;cursor:pointer;border-bottom:2px solid #2563eb;color:#2563eb;">좋아요 (찜)</button>
      <button id="tabReserved" onclick="switchTab('reserved')" style="flex:1;padding:14px 0;font-size:14px;font-weight:600;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;color:#9ca3af;">예약/알림</button>
    </div>

    <!-- 리스트 영역 -->
    <div id="mypageList"></div>

  </main>

  <!-- 모바일 하단 네비게이션 -->
  <nav class="bottom-nav mobile-only">
    <a href="feed.html" class="nav-item" aria-label="공동구매">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
    </a>
    <a href="index.html" class="nav-item" aria-label="홈">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 21v-8a1 1 0 00-1-1h-4a1 1 0 00-1 1v8"/><path d="M3 10a2 2 0 01.709-1.528l7-5.999a2 2 0 012.582 0l7 5.999A2 2 0 0121 10v9a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
    </a>
    <a href="mypage.html" class="nav-item active" aria-label="마이페이지">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 00-4-4H9a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </a>
  </nav>

  <script src="mock-data.js"></script>
  <script src="mypage.js"></script>
  <script src="search.js"></script>
  <script src="notification.js"></script>
</body>
</html>
