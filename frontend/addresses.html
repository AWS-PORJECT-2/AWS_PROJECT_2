<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>배송지 관리 - 두띵</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #f6f8fb;
      color: #1a1a1a;
      min-height: 100vh;
    }
    .topbar {
      background: #fff;
      padding: 16px 20px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .topbar a { color: #2563eb; text-decoration: none; font-size: 14px; }
    .container { max-width: 720px; margin: 0 auto; padding: 24px 20px 80px; }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .sub { color: #6b7280; font-size: 13px; margin-bottom: 20px; }
    .btn-primary {
      background: #2563eb; color: #fff; border: none; padding: 10px 18px;
      border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 14px;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary {
      background: #fff; color: #1a1a1a; border: 1px solid #e5e7eb; padding: 8px 14px;
      border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px;
    }
    .btn-secondary:hover { background: #f9fafb; }
    .btn-danger {
      background: #fff; color: #ef4444; border: 1px solid #fecaca; padding: 8px 14px;
      border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px;
    }
    .btn-danger:hover { background: #fef2f2; }
    .btn-danger:disabled { opacity: 0.4; cursor: not-allowed; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .addr-card {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px 18px;
      margin-bottom: 12px; transition: border-color 0.15s;
    }
    .addr-card.default { border-color: #2563eb; box-shadow: 0 0 0 1px #2563eb inset; }
    .addr-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .addr-label { font-weight: 700; font-size: 15px; }
    .badge-default {
      background: #2563eb; color: #fff; font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 999px;
    }
    .addr-line { font-size: 14px; color: #374151; line-height: 1.6; }
    .addr-meta { font-size: 12px; color: #6b7280; margin-top: 4px; }
    .addr-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .empty {
      background: #fff; border: 1px dashed #d1d5db; border-radius: 12px; padding: 40px 20px;
      text-align: center; color: #6b7280;
    }
    /* Modal */
    .modal-back {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      align-items: center; justify-content: center; z-index: 1000; padding: 20px;
    }
    .modal-back.active { display: flex; }
    .modal {
      background: #fff; border-radius: 16px; width: 100%; max-width: 520px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-head {
      padding: 18px 20px; border-bottom: 1px solid #e5e7eb;
      display: flex; justify-content: space-between; align-items: center;
    }
    .modal-head h2 { font-size: 17px; font-weight: 700; }
    .modal-close {
      background: none; border: none; font-size: 22px; cursor: pointer; color: #6b7280;
    }
    .modal-body { padding: 20px; }
    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #374151;
    }
    .field label .req { color: #ef4444; }
    .field input {
      width: 100%; padding: 11px 12px; border: 1.5px solid #e5e7eb; border-radius: 8px;
      font-size: 14px;
    }
    .field input:focus { outline: none; border-color: #2563eb; }
    .field-row { display: flex; gap: 10px; }
    .field-row > .field { flex: 1; }
    .checkbox {
      display: flex; align-items: center; gap: 8px; font-size: 13px; color: #374151;
      margin: 8px 0 14px;
    }
    .modal-foot {
      padding: 14px 20px; border-top: 1px solid #e5e7eb;
      display: flex; justify-content: flex-end; gap: 8px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/feed.html">← 피드로</a>
    <a href="#" id="logoutLink">로그아웃</a>
  </div>

  <div class="container">
    <h1>배송지 관리</h1>
    <p class="sub">상품을 받아볼 주소를 관리하세요. 마지막 배송지는 삭제할 수 없습니다.</p>

    <div class="toolbar">
      <div id="addrCount" style="font-size:13px;color:#6b7280;"></div>
      <button class="btn-primary" id="btnAdd">+ 새 배송지</button>
    </div>

    <div id="addrList"></div>
  </div>

  <!-- Add/Edit Modal -->
  <div class="modal-back" id="modal" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-head">
        <h2 id="modalTitle">배송지 추가</h2>
        <button type="button" class="modal-close" id="modalClose">×</button>
      </div>
      <div class="modal-body">
        <form id="addrForm">
          <div class="field">
            <label>별칭 <span class="req">*</span></label>
            <input type="text" name="label" placeholder="예: 자취방, 본가" maxlength="50" required>
          </div>
          <div class="field-row">
            <div class="field">
              <label>수령인 이름 <span class="req">*</span></label>
              <input type="text" name="recipientName" maxlength="50" required>
            </div>
            <div class="field">
              <label>연락처 <span class="req">*</span></label>
              <input type="tel" name="recipientPhone" placeholder="010-0000-0000" maxlength="20" required>
            </div>
          </div>
          <div class="field">
            <label>우편번호 <span class="req">*</span></label>
            <input type="text" name="postalCode" maxlength="10" required>
          </div>
          <div class="field">
            <label>도로명 주소 <span class="req">*</span></label>
            <input type="text" name="roadAddress" maxlength="200" required>
          </div>
          <div class="field">
            <label>지번 주소 (선택)</label>
            <input type="text" name="jibunAddress" maxlength="200">
          </div>
          <div class="field">
            <label>상세 주소 (선택)</label>
            <input type="text" name="detailAddress" placeholder="동/호수 등" maxlength="200">
          </div>
          <label class="checkbox">
            <input type="checkbox" name="isDefault"> 기본 배송지로 설정
          </label>
        </form>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn-secondary" id="modalCancel">취소</button>
        <button type="button" class="btn-primary" id="modalSubmit">저장</button>
      </div>
    </div>
  </div>

  <script src="payment-api.js"></script>
  <script src="addresses.js"></script>
</body>
</html>
