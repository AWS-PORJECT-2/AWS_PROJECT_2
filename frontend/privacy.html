<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>개인정보 처리방침 - 국민대학교</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="main-content">
    <header class="header mobile-only" style="border-bottom:1px solid #f0f0f0;">
      <div class="header-left">
        <button class="icon-btn" onclick="history.back()" aria-label="뒤로가기">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <span style="font-size:17px;font-weight:700;color:#1a1a1a;margin-left:4px;">개인정보 처리방침</span>
      </div>
    </header>
    <section style="padding:20px;line-height:1.8;font-size:14px;color:#4b5563;">
      <h3 style="font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:12px;">개인정보 처리방침</h3>
      <p>국민대학교 굿즈 펀딩 플랫폼 '두띵(Doothing)'은 이용자의 개인정보를 중요시하며, 개인정보보호법 등 관련 법령을 준수합니다.</p>
      <p style="margin-top:12px;">수집하는 개인정보: 이름, 학과, 연락처, 배송지 주소</p>
      <p style="margin-top:8px;">수집 목적: 공동구매 참여 확인, 상품 배송, 결제 처리</p>
      <p style="margin-top:8px;">보유 기간: 서비스 이용 종료 시까지 (탈퇴 시 즉시 파기)</p>
    </section>
  </main>
</body>
</html>
