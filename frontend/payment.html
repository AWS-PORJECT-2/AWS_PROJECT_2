<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>결제하기 - 국민대학교</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="main-content" style="padding-bottom:110px;">

    <!-- 헤더 -->
    <header class="header mobile-only" style="border-bottom:1px solid #f0f0f0;">
      <div class="header-left">
        <button class="icon-btn" onclick="history.back()" aria-label="뒤로가기">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <span style="font-size:17px;font-weight:700;color:#1a1a1a;margin-left:4px;">결제하기</span>
      </div>
    </header>

    <!-- 주문 상품 정보 -->
    <section id="orderSummary" style="padding:20px;border-bottom:1px solid #f0f0f0;"></section>

    <!-- 사이즈 확인/수정 -->
    <section id="sizeConfirm" style="padding:16px 20px;border-bottom:8px solid #f5f5f5;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <span style="font-size:14px;color:#6b7280;">예약 사이즈</span>
          <span id="confirmedSize" style="font-size:16px;font-weight:700;color:#2563eb;margin-left:8px;">-</span>
        </div>
        <button id="changeSizeBtn" onclick="toggleSizeChange()" style="font-size:13px;color:#2563eb;font-weight:600;background:none;border:none;cursor:pointer;text-decoration:underline;">변경</button>
      </div>
      <div id="sizeChangePanel" style="display:none;margin-top:12px;">
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          <button type="button" class="pay-size-btn" data-size="XS" onclick="changePaySize('XS')" style="padding:10px 16px;border:1.5px solid #e5e7eb;border-radius:10px;background:#fff;font-size:13px;font-weight:600;color:#4b5563;cursor:pointer;">XS</button>
          <button type="button" class="pay-size-btn" data-size="S" onclick="changePaySize('S')" style="padding:10px 16px;border:1.5px solid #e5e7eb;border-radius:10px;background:#fff;font-size:13px;font-weight:600;color:#4b5563;cursor:pointer;">S</button>
          <button type="button" class="pay-size-btn" data-size="M" onclick="changePaySize('M')" style="padding:10px 16px;border:1.5px solid #e5e7eb;border-radius:10px;background:#fff;font-size:13px;font-weight:600;color:#4b5563;cursor:pointer;">M</button>
          <button type="button" class="pay-size-btn" data-size="L" onclick="changePaySize('L')" style="padding:10px 16px;border:1.5px solid #e5e7eb;border-radius:10px;background:#fff;font-size:13px;font-weight:600;color:#4b5563;cursor:pointer;">L</button>
          <button type="button" class="pay-size-btn" data-size="XL" onclick="changePaySize('XL')" style="padding:10px 16px;border:1.5px solid #e5e7eb;border-radius:10px;background:#fff;font-size:13px;font-weight:600;color:#4b5563;cursor:pointer;">XL</button>
          <button type="button" class="pay-size-btn" data-size="XXL" onclick="changePaySize('XXL')" style="padding:10px 16px;border:1.5px solid #e5e7eb;border-radius:10px;background:#fff;font-size:13px;font-weight:600;color:#4b5563;cursor:pointer;">XXL</button>
        </div>
      </div>
    </section>

    <!-- 간편결제 -->
    <section style="padding:20px;border-bottom:8px solid #f5f5f5;">
      <h3 style="font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:16px;">간편결제</h3>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
        <button class="pay-option" data-method="tosspay" onclick="selectMethod('tosspay')" style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 8px;border:1.5px solid #e5e7eb;border-radius:14px;background:#fff;cursor:pointer;transition:all 0.2s;">
          <div style="width:44px;height:44px;border-radius:12px;background:#0064FF;display:flex;align-items:center;justify-content:center;">
            <span style="color:#fff;font-size:14px;font-weight:800;">toss</span>
          </div>
          <span style="font-size:12px;font-weight:600;color:#1a1a1a;">토스페이</span>
        </button>
        <button class="pay-option" data-method="kakaopay" onclick="selectMethod('kakaopay')" style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 8px;border:1.5px solid #e5e7eb;border-radius:14px;background:#fff;cursor:pointer;transition:all 0.2s;">
          <div style="width:44px;height:44px;border-radius:12px;background:#FEE500;display:flex;align-items:center;justify-content:center;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="#3C1E1E"><path d="M12 3C6.48 3 2 6.58 2 11c0 2.83 1.86 5.32 4.68 6.73l-.96 3.56c-.07.26.22.47.44.32l4.13-2.74c.56.06 1.13.13 1.71.13 5.52 0 10-3.58 10-8s-4.48-8-10-8z"/></svg>
          </div>
          <span style="font-size:12px;font-weight:600;color:#1a1a1a;">카카오페이</span>
        </button>
        <button class="pay-option" data-method="naverpay" onclick="selectMethod('naverpay')" style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 8px;border:1.5px solid #e5e7eb;border-radius:14px;background:#fff;cursor:pointer;transition:all 0.2s;">
          <div style="width:44px;height:44px;border-radius:12px;background:#03C75A;display:flex;align-items:center;justify-content:center;">
            <span style="color:#fff;font-size:16px;font-weight:800;">N</span>
          </div>
          <span style="font-size:12px;font-weight:600;color:#1a1a1a;">네이버페이</span>
        </button>
      </div>
    </section>

    <!-- 일반결제 -->
    <section style="padding:20px;border-bottom:8px solid #f5f5f5;">
      <h3 style="font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:16px;">일반결제</h3>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <button class="pay-option" data-method="card" onclick="selectMethod('card')" style="display:flex;align-items:center;gap:14px;padding:16px;border:1.5px solid #e5e7eb;border-radius:14px;background:#fff;cursor:pointer;transition:all 0.2s;width:100%;">
          <div style="width:40px;height:40px;border-radius:10px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><path d="M1 10h22"/></svg>
          </div>
          <div style="text-align:left;">
            <div style="font-size:14px;font-weight:600;color:#1a1a1a;">카드 결제</div>
            <div style="font-size:11px;color:#9ca3af;margin-top:2px;">신용/체크카드</div>
          </div>
        </button>
        <button class="pay-option" data-method="bank" onclick="selectMethod('bank')" style="display:flex;align-items:center;gap:14px;padding:16px;border:1.5px solid #e5e7eb;border-radius:14px;background:#fff;cursor:pointer;transition:all 0.2s;width:100%;">
          <div style="width:40px;height:40px;border-radius:10px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M3 10h18"/><path d="M5 6l7-3 7 3"/><path d="M4 10v11"/><path d="M20 10v11"/><path d="M8 14v3"/><path d="M12 14v3"/><path d="M16 14v3"/></svg>
          </div>
          <div style="text-align:left;">
            <div style="font-size:14px;font-weight:600;color:#1a1a1a;">무통장 입금</div>
            <div style="font-size:11px;color:#9ca3af;margin-top:2px;">가상계좌 발급</div>
          </div>
        </button>
      </div>
    </section>

    <!-- 카드 결제 입력 폼 (숨김) -->
    <section id="cardForm" style="display:none;padding:20px;border-bottom:8px solid #f5f5f5;">
      <h3 style="font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:16px;">카드 정보 입력</h3>
      <!-- 등록된 카드 -->
      <div id="savedCards" style="margin-bottom:12px;"></div>
      <!-- 새 카드 입력 -->
      <div style="display:flex;flex-direction:column;gap:10px;">
        <input id="cardNumber" type="text" placeholder="카드번호 (0000-0000-0000-0000)" maxlength="19" autocomplete="cc-number" style="padding:14px 16px;border:1px solid #e5e7eb;border-radius:10px;font-size:14px;outline:none;">
        <div style="display:flex;gap:10px;">
          <input id="cardExpiry" type="text" placeholder="유효기간 (MM/YY)" maxlength="5" autocomplete="cc-exp" style="flex:1;padding:14px 16px;border:1px solid #e5e7eb;border-radius:10px;font-size:14px;outline:none;">
          <input id="cardCvc" type="password" placeholder="CVC" maxlength="3" autocomplete="cc-csc" style="width:100px;padding:14px 16px;border:1px solid #e5e7eb;border-radius:10px;font-size:14px;outline:none;">
        </div>
        <p style="font-size:11px;color:#9ca3af;margin-top:4px;">* 카드 정보는 테스트 용도로만 사용되며 실제 저장되지 않습니다.</p>
      </div>
    </section>

    <!-- 무통장 입금 폼 (숨김) -->
    <section id="bankForm" style="display:none;padding:20px;border-bottom:8px solid #f5f5f5;">
      <h3 style="font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:16px;">무통장 입금 정보</h3>
      <!-- 등록된 계좌 -->
      <div id="savedAccounts" style="margin-bottom:12px;"></div>
      <!-- 실시간 입력 -->
      <div style="display:flex;flex-direction:column;gap:10px;">
        <select id="bankSelect" style="padding:14px 16px;border:1px solid #e5e7eb;border-radius:10px;font-size:14px;outline:none;background:#fff;color:#1a1a1a;">
          <option value="">은행 선택</option>
          <option value="kb">국민은행</option>
          <option value="shinhan">신한은행</option>
          <option value="woori">우리은행</option>
          <option value="hana">하나은행</option>
          <option value="nh">농협은행</option>
          <option value="kakao">카카오뱅크</option>
          <option value="toss">토스뱅크</option>
        </select>
        <input id="depositorName" type="text" placeholder="입금자명" style="padding:14px 16px;border:1px solid #e5e7eb;border-radius:10px;font-size:14px;outline:none;">
        <div style="background:#eff6ff;border-radius:10px;padding:14px 16px;margin-top:4px;">
          <p style="font-size:13px;color:#2563eb;font-weight:600;">입금 계좌 안내</p>
          <p style="font-size:15px;font-weight:700;color:#1a1a1a;margin-top:6px;">경남은행 29837974</p>
          <p style="font-size:12px;color:#6b7280;margin-top:2px;">예금주: 두띵(Doothing)</p>
          <p style="font-size:12px;color:#4b5563;margin-top:8px;line-height:1.6;">입금 확인 전까지 '결제 대기' 상태로 유지됩니다.<br>24시간 내 미입금 시 주문이 자동 취소됩니다.</p>
        </div>
      </div>
    </section>

    <!-- 최종 결제 금액 -->
    <section style="padding:20px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:14px;color:#6b7280;">상품 금액</span>
        <span id="itemPrice" style="font-size:14px;color:#1a1a1a;">0원</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;">
        <span style="font-size:14px;color:#6b7280;">배송비</span>
        <span style="font-size:14px;color:#16a34a;font-weight:600;">무료</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:16px;border-top:1px solid #f0f0f0;">
        <span style="font-size:16px;font-weight:700;color:#1a1a1a;">총 결제 금액</span>
        <span id="totalPrice" style="font-size:22px;font-weight:800;color:#2563eb;">0원</span>
      </div>
    </section>

  </main>

  <!-- 하단 결제 버튼 -->
  <div style="position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:12px 20px 28px;background:#fff;border-top:1px solid #e5e7eb;z-index:200;">
    <button id="btnPay" onclick="confirmPayment()" style="width:100%;padding:16px;border:none;border-radius:14px;background:#2563eb;color:#fff;font-size:17px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;">
      <span id="btnPayText">결제하기</span>
    </button>
  </div>

  <script src="mock-data.js"></script>
  <script src="payment.js"></script>
</body>
</html>
