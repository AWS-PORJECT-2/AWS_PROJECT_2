name: CI Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: HTML/CSS Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check file structure
        run: |
          echo "📁 Checking project structure..."
          test -f frontend/index.html && echo "✅ index.html exists" || echo "❌ index.html missing"
          test -f frontend/style.css && echo "✅ style.css exists" || echo "❌ style.css missing"
          test -f frontend/app.js && echo "✅ app.js exists" || echo "❌ app.js missing"

      - name: Check for console errors in JS
        run: |
          echo "🔍 Checking JS syntax..."
          node --check frontend/app.js && echo "✅ JS syntax OK" || exit 1
