<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://fastly.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <title>1:1 문의 · 두띵</title>
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="wz.css">
  <style>
    /* 1:1 문의 채팅 — wz 톤(보라). 페이지 전용 스코프 스타일. */
    .sup-wrap { max-width: 760px; margin: 0 auto; padding: var(--sp-6) var(--sp-4) var(--sp-10); }
    .sup-card {
      display: flex; flex-direction: column;
      height: calc(100vh - var(--wz-hd-h, 120px) - 220px);
      min-height: 460px;
      background: #fff; border: 1px solid var(--c-border);
      border-radius: var(--r-lg); box-shadow: var(--sh-2); overflow: hidden;
    }
    .sup-head {
      display: flex; align-items: center; gap: var(--sp-3);
      padding: 14px var(--sp-5); border-bottom: 1px solid var(--c-divider);
      background: var(--c-primary-50);
    }
    .sup-head__ic {
      width: 40px; height: 40px; flex-shrink: 0; border-radius: var(--r-full);
      background: var(--c-primary-500); color: #fff;
      display: flex; align-items: center; justify-content: center;
    }
    .sup-head__ic svg { width: 22px; height: 22px; }
    .sup-head__t { flex: 1; min-width: 0; }
    .sup-head__title { font-size: var(--fs-h3); font-weight: 800; color: var(--c-text); line-height: 1.3; }
    .sup-head__sub { font-size: var(--fs-caption); color: var(--c-text-muted); margin-top: 2px; }
    .sup-status {
      display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0;
      font-size: var(--fs-caption); font-weight: 700;
      padding: 5px 11px; border-radius: var(--r-full);
      background: var(--c-divider); color: var(--c-text-muted);
    }
    .sup-status__dot { width: 7px; height: 7px; border-radius: 50%; background: var(--c-text-faint); }
    .sup-status.is-online { background: #DCFCE7; color: #15803D; }
    .sup-status.is-online .sup-status__dot { background: var(--c-success); }

    .sup-msgs {
      flex: 1; overflow-y: auto; padding: var(--sp-5);
      display: flex; flex-direction: column; gap: var(--sp-2);
      background: var(--c-bg);
    }
    .sup-day { align-self: center; font-size: var(--fs-caption); color: var(--c-text-muted); padding: var(--sp-2) 0; }
    .sup-sys {
      align-self: center; max-width: 86%; text-align: center;
      font-size: var(--fs-body-sm); color: var(--c-text-sub);
      background: #fff; border: 1px solid var(--c-border);
      border-radius: var(--r-md); padding: 10px 14px; margin: var(--sp-2) 0;
    }
    .sup-sys--error { color: var(--c-danger); border-color: #FECACA; background: #FEF2F2; }

    .sup-row { display: flex; align-items: flex-end; gap: var(--sp-2); max-width: 100%; }
    .sup-row.me { flex-direction: row-reverse; }
    .sup-av {
      width: 30px; height: 30px; flex-shrink: 0; border-radius: var(--r-full);
      background: var(--c-primary-500); color: #fff;
      font-size: 10px; font-weight: 800;
      display: flex; align-items: center; justify-content: center; align-self: flex-start;
    }
    .sup-bubble {
      max-width: 72%; padding: 10px 14px; border-radius: var(--r-lg);
      font-size: var(--fs-body-sm); line-height: 1.55; word-break: break-word; white-space: pre-wrap;
    }
    .sup-row.them .sup-bubble {
      background: #fff; color: var(--c-text);
      border: 1px solid var(--c-border); border-bottom-left-radius: 4px;
    }
    .sup-row.me .sup-bubble {
      background: var(--c-primary-500); color: #fff; border-bottom-right-radius: 4px;
    }
    .sup-time { font-size: 10px; color: var(--c-text-faint); white-space: nowrap; flex-shrink: 0; }

    .sup-input {
      display: flex; align-items: center; gap: var(--sp-2);
      padding: var(--sp-3) var(--sp-4); border-top: 1px solid var(--c-divider); background: #fff;
    }
    .sup-input__text {
      flex: 1; box-sizing: border-box; height: 44px; padding: 0 16px;
      font-family: var(--font-sans); font-size: var(--fs-body-sm); color: var(--c-text);
      background: var(--c-bg); border: 1px solid var(--c-border); border-radius: var(--r-full); outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .sup-input__text:focus { border-color: var(--c-primary-500); box-shadow: 0 0 0 3px var(--c-primary-100); }
    .sup-input__send {
      width: 44px; height: 44px; flex-shrink: 0; border: none; cursor: pointer;
      border-radius: var(--r-full); background: var(--c-primary-500); color: #fff;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .sup-input__send svg { width: 20px; height: 20px; }
    .sup-input__send:hover { background: var(--c-primary-600); }
    .sup-input__send:disabled { background: var(--c-divider); color: var(--c-text-faint); cursor: not-allowed; }

    @media (max-width: 767px) {
      .sup-wrap { padding: var(--sp-3) 0 0; }
      .sup-card { height: calc(100vh - var(--wz-hd-h, 110px)); min-height: 0; border-radius: 0; border-left: none; border-right: none; box-shadow: none; }
    }
  </style>
</head>
<body class="wz-body">
  <div id="wz-header"></div>

  <main>
    <div class="sup-wrap">
      <div class="sup-card">
        <div class="sup-head">
          <span class="sup-head__ic" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4 9.9 9.9 0 0 1-4-1L3 20l1.1-4A8.4 8.4 0 1 1 21 11.5z"/></svg>
          </span>
          <div class="sup-head__t">
            <div class="sup-head__title">1:1 문의</div>
            <div class="sup-head__sub">두띵 고객센터에 무엇이든 물어보세요.</div>
          </div>
          <span id="supStatus" class="sup-status">
            <span class="sup-status__dot"></span><span id="supStatusText">연결 중</span>
          </span>
        </div>

        <div class="sup-msgs" id="supMsgs"></div>

        <div class="sup-input">
          <input type="text" id="supInput" class="sup-input__text" placeholder="메시지를 입력하세요" maxlength="2000" autocomplete="off" disabled>
          <button class="sup-input__send" id="supSend" type="button" aria-label="전송" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </main>

  <div id="wz-footer"></div>

  <script src="api.js"></script>
  <script src="categories.js"></script>
  <script src="category-icons.js"></script>
  <script src="wz-core.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="chat-user.js"></script>
</body>
</html>
