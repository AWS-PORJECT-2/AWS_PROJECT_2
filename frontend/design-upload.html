<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>디자인 업로드 - 국민대학교</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body.main-page { background: var(--bg-page); }
    .du-page {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 32px 80px;
      box-sizing: border-box;
    }
    .du-header {
      text-align: center;
      margin-bottom: 48px;
    }
    .du-header h2 {
      font-size: 32px;
      font-weight: 800;
      color: #1a1a1a;
      margin: 0;
    }
    .du-header p {
      font-size: 16px;
      color: #6b7280;
      margin-top: 12px;
    }
    /* 카테고리 카드 그리드 (1단계) */
    .category-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      padding: 0;
      width: 100%;
    }
    .category-card {
      background: #fff;
      border: 1.5px solid #e5e7eb;
      border-radius: 20px;
      padding: 40px 24px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
      transition: all 0.2s ease;
      width: 100%;
      box-sizing: border-box;
    }
    .category-card:hover {
      border-color: #a5b4fc;
      background: #f8faff;
      transform: translateY(-4px);
      box-shadow: 0 12px 28px rgba(91, 110, 225, 0.12);
    }
    .category-card.selected {
      border-color: #8b5cf6;
      background: #f3f0fe;
    }
    .category-card .icon {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .category-card .icon svg {
      width: 48px;
      height: 48px;
    }
    .category-card .title {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
    }
    .category-card .desc {
      font-size: 14px;
      color: #9ca3af;
      line-height: 1.5;
    }
    /* 2단계: 업로드/다운로드 박스 */
    .du-action-card {
      max-width: 720px;
      margin: 0 auto;
      background: transparent;
      border: none;
      box-shadow: none;
      padding: 0;
    }
    @media (max-width: 900px) {
      .du-page {
        padding: 24px 16px 60px;
      }
      .du-header { text-align: left; margin-bottom: 24px; }
      .du-header h2 { font-size: 20px; }
      .du-header p { font-size: 14px; margin-top: 6px; }
      .category-container {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .category-card {
        flex-direction: row;
        align-items: center;
        text-align: left;
        padding: 16px;
        gap: 14px;
        border-radius: 14px;
      }
      .category-card .icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        margin-right: 0;
      }
      .category-card .icon svg {
        width: 24px;
        height: 24px;
      }
      .category-card .title { font-size: 15px; font-weight: 600; }
      .category-card .desc { font-size: 12px; }
      .du-action-card {
        max-width: 100%;
        margin: 0 auto;
        padding: 0;
      }
    }
  </style>
  <link rel="stylesheet" href="main.css">
</head>
<body class="main-page" data-page="sub">
  <div id="app"></div>

  <main class="du-page">

    <!-- 카테고리는 design-select.html에서 이미 선택됨 -->

      <!-- 업로드/다운로드 -->
      <div id="stepAction" class="du-action-card">
        <div style="text-align:center;margin-bottom:24px;">
          <h2 id="actionTitle" style="font-size:24px;font-weight:800;color:#1a1a1a;margin:0;">과잠 디자인</h2>
          <p style="font-size:15px;color:#9ca3af;margin-top:8px;line-height:1.6;">디자인이 준비되어 있다면 업로드하고,<br>아직 없다면 도면 템플릿을 다운로드하세요</p>
        </div>

        <div style="display:flex;flex-direction:column;gap:10px;">
          <button onclick="goToFundCreate()" style="width:100%;padding:16px;border:1.5px solid #c7d2fe;border-radius:12px;background:#f5f6ff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;">
            <span style="font-size:15px;font-weight:600;color:#4f46e5;">이미 있어요</span>
          </button>
          <a id="downloadLink" href="#" download style="width:100%;padding:16px;border:1.5px solid #e5e7eb;border-radius:12px;background:#fafafa;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:all 0.2s;">
            <span id="downloadLabel" style="font-size:15px;font-weight:600;color:#6b7280;">도면 다운로드</span>
          </a>
          <button onclick="location.href='design-select.html'" style="width:100%;padding:12px;border:none;border-radius:12px;background:transparent;cursor:pointer;font-size:13px;color:#9ca3af;font-weight:500;">← 다른 제품 선택</button>
        </div>

        <div style="margin-top:20px;">
          <div style="background:#f9fafb;border-radius:12px;padding:16px;">
            <p style="font-size:13px;color:#6b7280;line-height:1.6;">
              <strong style="color:#1a1a1a;">지원 형식</strong><br>
              JPG, PNG, PDF, AI, PSD (최대 10MB)
            </p>
          </div>
        </div>
      </div>

  </main>

  <script>
    var selectedProduct = '';

    var CATEGORY_DATA = {
      varsity: { label: '과잠', template: 'assets/blueprint.jpg', templateName: 'varsity_template.jpg' },
      tshirt: { label: '반팔티', template: 'assets/blueprint.jpg', templateName: 'tshirt_template.jpg' },
      ecobag: { label: '에코백', template: 'assets/blueprint.jpg', templateName: 'ecobag_template.jpg' },
      hoodie: { label: '후드티', template: 'assets/blueprint.jpg', templateName: 'hoodie_template.jpg' },
      keyring: { label: '키링', template: 'assets/blueprint.jpg', templateName: 'keyring_template.jpg' },
      sticker: { label: '스티커', template: 'assets/blueprint.jpg', templateName: 'sticker_template.jpg' },
    };

    function goToFundCreate() {
      var cat = CATEGORY_DATA[selectedProduct] ? CATEGORY_DATA[selectedProduct].label : selectedProduct;
      window.location.href = 'fund-create.html?category=' + encodeURIComponent(cat);
    }

    // Auto-select category from URL param
    (function() {
      var params = new URLSearchParams(window.location.search);
      var cat = params.get('category');
      if (cat) {
        var categoryMap = { '과잠': 'varsity', '반팔티': 'tshirt', '에코백': 'ecobag', '후드티': 'hoodie', '키링': 'keyring', '스티커': 'sticker' };
        var key = categoryMap[cat] || cat;
        if (CATEGORY_DATA[key]) {
          selectedProduct = key;
          document.getElementById('actionTitle').textContent = CATEGORY_DATA[key].label + ' 디자인';
          document.getElementById('downloadLink').href = CATEGORY_DATA[key].template;
          document.getElementById('downloadLink').download = CATEGORY_DATA[key].templateName;
          document.getElementById('downloadLabel').textContent = CATEGORY_DATA[key].label + ' 도면 다운로드';
        }
      }
    })();
  </script>

  <script src="category-icons.js"></script>
  <script src="main.js"></script>
</body>
</html>
