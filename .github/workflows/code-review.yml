name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  codeball:
    name: Codeball AI Review
    runs-on: ubuntu-latest
    steps:
      - name: Codeball AI Code Review
        uses: sturdy-dev/codeball-action@v2
