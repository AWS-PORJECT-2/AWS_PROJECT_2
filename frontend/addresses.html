<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>배송지 관리 - 두띵</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .container { max-width: 720px; margin: 0 auto; padding: 24px 20px 100px; }
    .sub { color: #6b7280; font-size: 13px; margin-bottom: 20px; }
    .btn-primary {
      background: #2563eb; color: #fff; border: none; padding: 10px 18px;
      border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 14px;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary {
      background: #fff; color: #1a1a1a; border: 1px solid #e5e7eb; padding: 8px 14px;
      border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px;
    }
    .btn-secondary:hover { background: #f9fafb; }
    .btn-danger {
      background: #fff; color: #ef4444; border: 1px solid #fecaca; padding: 8px 14px;
      border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px;
    }
    .btn-danger:hover { background: #fef2f2; }
    .btn-danger:disabled { opacity: 0.4; cursor: not-allowed; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .addr-card {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px 18px;
      margin-bottom: 12px; transition: border-color 0.15s;
    }
    .addr-card.default { border-color: #2563eb; box-shadow: 0 0 0 1px #2563eb inset; }
    .addr-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .addr-label { font-weight: 700; font-size: 15px; }
    .badge-default {
      background: #2563eb; color: #fff; font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 999px;
    }
    .addr-line { font-size: 14px; color: #374151; line-height: 1.6; }
    .addr-meta { font-size: 12px; color: #6b7280; margin-top: 4px; }
    .addr-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .empty {
      background: #fff; border: 1px dashed #d1d5db; border-radius: 12px; padding: 40px 20px;
      text-align: center; color: #6b7280;
    }

    .modal-back {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      align-items: center; justify-content: center; z-index: 1000; padding: 20px;
    }
    .modal-back.active { display: flex; }
    .modal {
      background: #fff; border-radius: 16px; width: 100%; max-width: 520px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-head {
      padding: 18px 20px; border-bottom: 1px solid #e5e7eb;
      display: flex; justify-content: space-between; align-items: center;
    }
    .modal-head h2 { font-size: 17px; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #6b7280; }
    .modal-body { padding: 20px; }
    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #374151;
    }
    .field label .req { color: #ef4444; }
    .field input {
      width: 100%; padding: 11px 12px; border: 1.5px solid #e5e7eb; border-radius: 8px;
      font-size: 14px;
    }
    .field input:focus { outline: none; border-color: #2563eb; }
    .field-row { display: flex; gap: 10px; }
    .field-row > .field { flex: 1; }
    .checkbox {
      display: flex; align-items: center; gap: 8px; font-size: 13px; color: #374151;
      margin: 8px 0 14px;
    }
    .modal-foot {
      padding: 14px 20px; border-top: 1px solid #e5e7eb;
      display: flex; justify-content: flex-end; gap: 8px;
    }
  </style>
</head>
<body>

  <!-- 데스크톱 사이드바 -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <a href="index.html" class="logo-link">
        <span class="logo-mark"></span>
        <span class="logo-text">doothing</span>
      </a>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="sidebar-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h1v7c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-7h1a1 1 0 00.7-1.7l-9-9a1 1 0 00-1.4 0l-9 9A1 1 0 003 13z"/></svg>
        <span>홈</span>
      </a>
      <a href="feed.html" class="sidebar-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        <span>공동구매</span>
      </a>
      <a href="announcements.html" class="sidebar-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
        <span>공지사항</span>
      </a>
    </nav>
    <div class="sidebar-bottom">
      <a href="/profile.html" class="sidebar-item active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>마이페이지</span>
      </a>
    </div>
  </aside>

  <main class="main-content">
    <header class="header mobile-only" style="border-bottom:1px solid #f0f0f0;">
      <div class="header-left">
        <button class="icon-btn" onclick="history.back()" aria-label="뒤로가기" style="margin-right:4px;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <span style="font-size:17px;font-weight:700;color:#1a1a1a;">배송지 관리</span>
      </div>
    </header>

    <header class="desktop-topbar desktop-only">
      <h1 style="font-size:22px;font-weight:700;color:#1a1a1a;">배송지 관리</h1>
    </header>

    <div class="container">
      <p class="sub">상품을 받아볼 주소를 관리하세요. 마지막 배송지는 삭제할 수 없습니다.</p>

      <div class="toolbar">
        <div id="addrCount" style="font-size:13px;color:#6b7280;"></div>
        <button class="btn-primary" id="btnAdd">+ 새 배송지</button>
      </div>

      <div id="addrList"></div>
    </div>
  </main>

  <nav class="bottom-nav mobile-only">
    <a href="feed.html" class="nav-item" aria-label="공동구매">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
    </a>
    <a href="index.html" class="nav-item" aria-label="홈">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 21v-8a1 1 0 00-1-1h-4a1 1 0 00-1 1v8"/><path d="M3 10a2 2 0 01.709-1.528l7-5.999a2 2 0 012.582 0l7 5.999A2 2 0 0121 10v9a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
    </a>
    <a href="/profile.html" class="nav-item active" aria-label="마이페이지">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21v-2a4 4 0 00-4-4H9a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </a>
  </nav>

  <!-- Add/Edit Modal -->
  <div class="modal-back" id="modal" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-head">
        <h2 id="modalTitle">배송지 추가</h2>
        <button type="button" class="modal-close" id="modalClose">×</button>
      </div>
      <div class="modal-body">
        <form id="addrForm">
          <div class="field">
            <label>별칭 <span class="req">*</span></label>
            <input type="text" name="label" placeholder="예: 자취방, 본가" maxlength="50" required>
          </div>
          <div class="field-row">
            <div class="field">
              <label>수령인 이름 <span class="req">*</span></label>
              <input type="text" name="recipientName" maxlength="50" required>
            </div>
            <div class="field">
              <label>연락처 <span class="req">*</span></label>
              <input type="tel" name="recipientPhone" placeholder="010-0000-0000" maxlength="20" required>
            </div>
          </div>
          <div class="field">
            <label>우편번호 <span class="req">*</span></label>
            <input type="text" name="postalCode" maxlength="10" required>
          </div>
          <div class="field">
            <label>도로명 주소 <span class="req">*</span></label>
            <input type="text" name="roadAddress" maxlength="200" required>
          </div>
          <div class="field">
            <label>지번 주소 (선택)</label>
            <input type="text" name="jibunAddress" maxlength="200">
          </div>
          <div class="field">
            <label>상세 주소 (선택)</label>
            <input type="text" name="detailAddress" placeholder="동/호수 등" maxlength="200">
          </div>
          <label class="checkbox">
            <input type="checkbox" name="isDefault"> 기본 배송지로 설정
          </label>
        </form>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn-secondary" id="modalCancel">취소</button>
        <button type="button" class="btn-primary" id="modalSubmit">저장</button>
      </div>
    </div>
  </div>

  <script src="payment-api.js"></script>
  <script src="addresses.js"></script>
</body>
</html>
