<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공동구매 피드 - doothing</title>
  <link rel="stylesheet" href="main.css">
  <link rel="stylesheet" href="feed.css">
</head>
<body class="main-page" data-page="feed">
  <div id="app"></div>

  <main class="feed-main">
    <!-- 추천 카테고리 (상단) -->
    <section class="feed-toolbar">
      <div class="recommend-row" id="recommendRow">
        <button type="button" class="rec-chip rec-active" data-rec="all">전체</button>
        <button type="button" class="rec-chip" data-rec="인기">🔥 인기</button>
        <button type="button" class="rec-chip" data-rec="신규">🆕 신규</button>
      </div>

      <!-- 카테고리 칩 + 정렬 + 학과 -->
      <div class="filter-row">
        <div id="categoryChips" class="category-chips"></div>
        <div class="filter-controls">
          <select id="sortSelect" onchange="onSortChange()">
            <option value="popular">인기순</option>
            <option value="latest">최신순</option>
          </select>
          <select id="deptFilter" onchange="onFilterChange()">
            <option value="all">전체 학과</option>
          </select>
        </div>
      </div>
    </section>

    <!-- 4-col 그리드 피드 -->
    <section class="feed-grid" id="feedList"></section>
  </main>

  <script src="api.js"></script>
  <script src="mock-data.js"></script>
  <script src="motion.js"></script>
  <script src="search.js"></script>
  <script src="notification.js"></script>
  <script src="category-icons.js"></script>
  <script src="main.js"></script>
  <script src="feed.js"></script>
</body>
</html>
