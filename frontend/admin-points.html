<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>관리자 · 포인트 관리 · 두띵</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    /* 독립 관리자 페이지 — 기존 admin.js/SPA 와 분리. 토큰/디자인 톤만 맞춤. */
    :root { --blue:#2563eb; --blue-d:#1d4ed8; --line:#e5e7eb; --muted:#6b7280; --ink:#111827; }
    * { box-sizing: border-box; }
    body { font-family: Pretendard, -apple-system, sans-serif; margin:0; background:#f7f8fa; color:var(--ink); }
    .wrap { max-width:760px; margin:0 auto; padding:20px 16px 64px; }
    h1 { font-size:20px; font-weight:800; margin:8px 0 4px; }
    .sub { color:var(--muted); font-size:13px; margin-bottom:20px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px; margin-bottom:16px; }
    .card h2 { font-size:15px; font-weight:700; margin:0 0 12px; }
    label { display:block; font-size:13px; font-weight:600; margin-bottom:6px; }
    input[type=text], input[type=number] { width:100%; padding:11px 12px; border:1.5px solid var(--line); border-radius:10px; font-size:14px; outline:none; }
    input:focus { border-color:var(--blue); }
    .row { display:flex; gap:8px; align-items:flex-end; }
    .row > div { flex:1; }
    button { padding:11px 16px; border:none; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; background:var(--blue); color:#fff; white-space:nowrap; }
    button:hover { background:var(--blue-d); }
    button.sec { background:#eef2ff; color:var(--blue); }
    .bal { display:flex; align-items:baseline; gap:8px; padding:14px 16px; background:#eff6ff; border-radius:12px; margin-bottom:14px; }
    .bal .v { font-size:28px; font-weight:800; color:var(--blue); }
    .bal .u { color:var(--blue); font-weight:700; }
    .bal .l { color:var(--muted); font-size:13px; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th, td { padding:9px 8px; text-align:left; border-bottom:1px solid #f0f0f0; white-space:nowrap; }
    th { font-size:12px; color:var(--muted); background:#fafafa; }
    td.earn { color:#16a34a; font-weight:700; }
    td.spend { color:#ef4444; font-weight:700; }
    .muted { color:#9ca3af; padding:14px 0; }
    .seg { display:flex; gap:14px; margin-bottom:12px; }
    .seg label { display:flex; align-items:center; gap:6px; font-weight:500; cursor:pointer; }
    .msg { margin-bottom:14px; padding:11px 14px; border-radius:10px; font-size:14px; display:none; }
    .msg.show { display:block; }
    .msg.ok { background:#dcfce7; color:#166534; }
    .msg.err { background:#fef2f2; color:#b91c1c; }
    .msg.info { background:#eff6ff; color:#1d4ed8; }
    .hint { font-size:12px; color:#9ca3af; margin-top:6px; }
    .tablewrap { overflow-x:auto; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>포인트 관리</h1>
    <p class="sub">관리자 전용 화면입니다. 권한이 없으면 서버가 403으로 거부합니다.</p>

    <div id="msg" class="msg" role="status" aria-live="polite"></div>

    <section class="card">
      <h2>대상 사용자 조회</h2>
      <div class="row">
        <div>
          <label for="uid">사용자 ID (UUID)</label>
          <input type="text" id="uid" placeholder="예: 3fa85f64-5717-4562-b3fc-2c963f66afa6" autocomplete="off">
        </div>
        <button type="button" id="lookup">조회</button>
      </div>
    </section>

    <section class="card">
      <h2>현재 포인트 / 최근 거래</h2>
      <div class="bal">
        <span class="l">포인트</span>
        <span class="v" id="bal">-</span>
        <span class="u">P</span>
      </div>
      <div class="tablewrap">
        <table>
          <thead>
            <tr><th>유형</th><th>사유</th><th>금액</th><th>변동 후</th><th>시각</th></tr>
          </thead>
          <tbody id="txs">
            <tr><td colspan="5" class="muted">사용자를 조회하면 거래 내역이 표시됩니다.</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h2>포인트 조정</h2>
      <div class="seg">
        <label><input type="radio" name="mode" value="delta" checked> 증감(+/-)</label>
        <label><input type="radio" name="mode" value="set"> 절대값 설정</label>
      </div>
      <div style="margin-bottom:12px">
        <label id="amtLabel" for="amt">증감 금액 (양수=적립, 음수=차감, 0 제외)</label>
        <input type="number" id="amt" step="1" placeholder="예: 100 또는 -50">
        <p class="hint" id="amtHint">정수만 입력하세요. 최종 검증은 서버가 수행합니다.</p>
      </div>
      <div style="margin-bottom:14px">
        <label for="reason">사유 (필수)</label>
        <input type="text" id="reason" maxlength="200" placeholder="예: 이벤트 보상, 오지급 회수">
      </div>
      <button type="button" id="apply">적용</button>
    </section>
  </div>

  <script src="api.js"></script>
  <script src="admin-points.js"></script>
</body>
</html>
