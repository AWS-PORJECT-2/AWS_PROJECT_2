<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - 두띵(Doothing)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, rgba(218,178,255,0.3) 0%, rgba(116,212,255,0.3) 50%, rgba(94,233,181,0.3) 100%);
      color: #1a1a1a;
    }
    .login-card {
      width: 100%;
      max-width: 380px;
      background: #fff;
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.08);
      text-align: center;
    }
    .brand { font-size: 28px; font-weight: 800; color: #2B5F9E; letter-spacing: -0.5px; }
    .tagline { font-size: 14px; color: #6b7280; margin-top: 8px; }
    .divider { height: 1px; background: #f0f0f0; margin: 32px 0 28px; }
    .login-btn {
      width: 100%;
      height: 54px;
      border: 1px solid #e5e7eb;
      background: #fff;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 500;
      color: #374151;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: opacity 0.15s;
    }
    .login-btn:active { opacity: 0.85; }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .dev-hint {
      margin-top: 24px;
      font-size: 12px;
      color: #9ca3af;
      line-height: 1.6;
    }
    .error {
      margin-top: 16px;
      font-size: 13px;
      color: #ef4444;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">doothing</div>
    <p class="tagline">학교 계정으로 로그인하세요</p>
    <div class="divider"></div>
    <button id="loginBtn" class="login-btn" type="button">
      <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      <span id="loginBtnText">학교 계정으로 로그인</span>
    </button>
    <p id="errorMsg" class="error" style="display:none;"></p>
    <p class="dev-hint">국민대 Google Workspace 이메일(@kookmin.ac.kr)로<br>로그인할 수 있습니다</p>
  </div>

  <script>
    (function () {
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('loginBtnText');
      const errorEl = document.getElementById('errorMsg');

      const params = new URLSearchParams(window.location.search);
      const errorParam = params.get('error');
      if (errorParam) {
        const messages = {
          INVALID_EMAIL_DOMAIN: '허용된 학교 이메일 계정으로만 로그인 가능합니다',
          AUTH_FAILED: '인증에 실패했습니다',
          INVALID_STATE: '로그인 세션이 만료되었습니다. 다시 시도해주세요',
          missing_params: '인증 정보가 누락되었습니다',
          GOOGLE_UNAVAILABLE: '인증 서버에 연결할 수 없습니다',
        };
        errorEl.textContent = messages[errorParam] || '로그인에 실패했습니다';
        errorEl.style.display = 'block';
        history.replaceState({}, '', window.location.pathname);
      }

      btn.addEventListener('click', async () => {
        btn.disabled = true;
        btnText.textContent = '이동 중...';
        errorEl.style.display = 'none';

        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ rememberMe: false }),
          });
          const data = await res.json();
          if (data.authUrl) {
            window.location.href = data.authUrl;
          } else {
            throw new Error(data.message || '로그인 요청 실패');
          }
        } catch (e) {
          errorEl.textContent = '서버에 연결할 수 없습니다';
          errorEl.style.display = 'block';
          btn.disabled = false;
          btnText.textContent = '학교 계정으로 로그인';
        }
      });
    })();
  </script>
</body>
</html>
