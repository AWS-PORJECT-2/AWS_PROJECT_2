<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1:1 문의 - 두띵</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .chat-container { max-width:430px; margin:0 auto; height:100vh; display:flex; flex-direction:column; background:#b2c7d9; }
    .chat-header { display:flex; align-items:center; gap:12px; padding:14px 16px; background:#fff; border-bottom:1px solid #e5e7eb; }
    .chat-header .back-btn { background:none; border:none; cursor:pointer; }
    .chat-header h1 { font-size:16px; font-weight:700; color:#1a1a1a; flex:1; }
    .chat-messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:8px; }
    .msg-row { display:flex; align-items:flex-end; gap:6px; }
    .msg-row.me { flex-direction:row-reverse; }
    .msg-bubble { max-width:70%; padding:10px 14px; border-radius:16px; font-size:14px; line-height:1.5; word-break:break-word; }
    .msg-row.admin .msg-bubble { background:#fff; color:#1a1a1a; border-bottom-left-radius:4px; }
    .msg-row.me .msg-bubble { background:#fee500; color:#1a1a1a; border-bottom-right-radius:4px; }
    .msg-time { font-size:10px; color:#6b7280; white-space:nowrap; }
    .msg-bubble img { max-width:200px; border-radius:8px; display:block; margin-top:4px; }
    .chat-input { display:flex; align-items:center; gap:8px; padding:10px 12px; background:#fff; border-top:1px solid #e5e7eb; }
    .chat-input input[type="text"] { flex:1; padding:10px 14px; border:1px solid #e5e7eb; border-radius:20px; font-size:14px; outline:none; }
    .chat-input button { width:36px; height:36px; border-radius:50%; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .btn-attach { background:#f3f4f6; }
    .btn-send { background:#fee500; }
    .admin-avatar { width:36px; height:36px; border-radius:50%; background:#2563eb; display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px; font-weight:700; }
    .msg-row.admin .admin-avatar { width:32px; height:32px; border-radius:50%; background:#2563eb; display:flex; align-items:center; justify-content:center; color:#fff; font-size:10px; font-weight:700; flex-shrink:0; align-self:flex-start; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <button class="back-btn" onclick="history.back()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <h1>1:1 문의</h1>
      <div class="admin-avatar">관리</div>
    </div>
    <div class="chat-messages" id="chatMessages">
      <!-- Messages rendered by JS -->
    </div>
    <div class="chat-input">
      <input type="file" id="photoInput" accept="image/*" hidden>
      <button class="btn-attach" onclick="document.getElementById('photoInput').click()" aria-label="사진 첨부">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <input type="text" id="chatInput" placeholder="메시지를 입력하세요..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button class="btn-send" onclick="sendMessage()" aria-label="전송">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <script>
    var STORAGE_KEY = 'doothing_chat_messages';
    var messages = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

    // Initial admin greeting if empty
    if (messages.length === 0) {
      messages.push({ from: 'admin', text: '안녕하세요! 두띵 고객센터입니다. 무엇을 도와드릴까요?', time: new Date().toISOString(), type: 'text' });
      saveMessages();
    }

    function saveMessages() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
    }

    function formatTime(iso) {
      var d = new Date(iso);
      var h = d.getHours();
      var m = String(d.getMinutes()).padStart(2, '0');
      var ampm = h >= 12 ? '오후' : '오전';
      h = h % 12 || 12;
      return ampm + ' ' + h + ':' + m;
    }

    function renderMessages() {
      var container = document.getElementById('chatMessages');
      container.innerHTML = '';
      messages.forEach(function(msg) {
        var row = document.createElement('div');
        row.className = 'msg-row ' + (msg.from === 'admin' ? 'admin' : 'me');

        if (msg.from === 'admin') {
          var avatar = document.createElement('div');
          avatar.className = 'admin-avatar';
          avatar.textContent = '관리';
          row.appendChild(avatar);
        }

        var bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        if (msg.type === 'image') {
          var img = document.createElement('img');
          img.src = msg.text;
          img.alt = '첨부 이미지';
          bubble.appendChild(img);
        } else {
          bubble.textContent = msg.text;
        }
        row.appendChild(bubble);

        var time = document.createElement('span');
        time.className = 'msg-time';
        time.textContent = formatTime(msg.time);
        row.appendChild(time);

        container.appendChild(row);
      });
      container.scrollTop = container.scrollHeight;
    }

    function sendMessage() {
      var input = document.getElementById('chatInput');
      var text = input.value.trim();
      if (!text) return;
      messages.push({ from: 'me', text: text, time: new Date().toISOString(), type: 'text' });
      saveMessages();
      input.value = '';
      renderMessages();

      // Simulate admin reply after 1 second
      setTimeout(function() {
        var replies = [
          '확인 중입니다. 잠시만 기다려 주세요!',
          '해당 건은 담당자에게 전달하겠습니다.',
          '추가 정보가 필요합니다. 주문번호를 알려주시겠어요?',
          '감사합니다! 빠르게 처리해 드리겠습니다.',
        ];
        var reply = replies[Math.floor(Math.random() * replies.length)];
        messages.push({ from: 'admin', text: reply, time: new Date().toISOString(), type: 'text' });
        saveMessages();
        renderMessages();
      }, 1000);
    }

    // Photo upload
    document.getElementById('photoInput').addEventListener('change', function(e) {
      var file = e.target.files[0];
      if (!file || !file.type.startsWith('image/')) return;
      var reader = new FileReader();
      reader.onload = function(ev) {
        messages.push({ from: 'me', text: ev.target.result, time: new Date().toISOString(), type: 'image' });
        saveMessages();
        renderMessages();
      };
      reader.readAsDataURL(file);
      e.target.value = '';
    });

    renderMessages();
  </script>
</body>
</html>
