<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://fastly.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <title>배송지 관리 · 두띵</title>
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="wz.css">
  <style>
    .adr-wrap { max-width: 760px; margin: 0 auto; padding: 32px var(--sp-6) 96px; }
    .adr-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 24px; }
    .adr-head__eyebrow {
      display: inline-block; margin-bottom: 10px; padding: 4px 12px;
      border-radius: var(--r-full); background: var(--c-primary-50);
      color: var(--c-primary-700); font-size: var(--fs-caption); font-weight: 700;
    }
    .adr-head h1 { margin: 0 0 6px; font-size: var(--fs-h1); font-weight: 800; color: var(--c-text); }
    .adr-head__sub { margin: 0; font-size: var(--fs-body-sm); color: var(--c-text-muted); }

    .adr-list { display: flex; flex-direction: column; gap: 12px; }

    .adr-card {
      display: flex; gap: 14px; padding: 18px;
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: var(--r-md); transition: border-color .15s, box-shadow .15s;
    }
    .adr-card.is-default { border-color: var(--c-primary-400); box-shadow: 0 0 0 1px var(--c-primary-400) inset; }
    .adr-card__ic {
      flex: none; width: 40px; height: 40px; border-radius: var(--r-full);
      display: flex; align-items: center; justify-content: center;
      background: var(--c-primary-50); color: var(--c-primary-600);
    }
    .adr-card__ic svg { width: 22px; height: 22px; }
    .adr-card__body { flex: 1; min-width: 0; }
    .adr-card__title { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: var(--fs-body); font-weight: 700; color: var(--c-text); }
    .adr-card__line { margin-top: 6px; font-size: var(--fs-body-sm); color: var(--c-text-sub); line-height: 1.55; }
    .adr-card__meta { margin-top: 4px; font-size: var(--fs-caption); color: var(--c-text-muted); line-height: 1.5; }
    .adr-badge {
      flex: none; padding: 2px 9px; border-radius: var(--r-full);
      background: var(--c-primary-500); color: #fff; font-size: var(--fs-caption); font-weight: 700; line-height: 1.4;
    }
    .adr-card__actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }

    .adr-mini {
      height: 34px; padding: 0 13px; border-radius: var(--r-sm);
      background: #fff; border: 1px solid var(--c-border); cursor: pointer;
      font-family: inherit; font-size: 13px; font-weight: 700; color: var(--c-text-sub);
      display: inline-flex; align-items: center; transition: background .15s, border-color .15s, color .15s;
    }
    .adr-mini:hover { border-color: var(--c-primary-400); color: var(--c-primary-600); background: var(--c-primary-50); }
    .adr-mini--ghost { color: var(--c-primary-600); border-color: var(--c-primary-400); }
    .adr-mini--danger { color: var(--c-danger); border-color: #FECACA; }
    .adr-mini--danger:hover { background: #FEF2F2; border-color: #FCA5A5; color: var(--c-danger); }
    .adr-mini:disabled { opacity: .45; cursor: not-allowed; }

    .adr-empty, .adr-loading, .adr-error {
      padding: 56px 20px; text-align: center; font-size: var(--fs-body-sm); color: var(--c-text-muted);
      background: var(--c-surface); border: 1px dashed var(--c-border); border-radius: var(--r-md);
    }
    .adr-error { color: var(--c-danger); }

    /* ===== 모달 ===== */
    .adr-modal-back {
      position: fixed; inset: 0; z-index: 1000; padding: 20px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(17, 17, 17, .45); opacity: 0; transition: opacity .2s;
    }
    .adr-modal-back.is-open { opacity: 1; }
    .adr-modal {
      width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
      background: var(--c-surface); border-radius: var(--r-lg);
      box-shadow: 0 24px 60px rgba(17, 17, 17, .25);
      transform: translateY(12px); transition: transform .2s;
    }
    .adr-modal-back.is-open .adr-modal { transform: translateY(0); }
    .adr-modal__head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px; border-bottom: 1px solid var(--c-border);
    }
    .adr-modal__title { margin: 0; font-size: var(--fs-h3); font-weight: 800; color: var(--c-text); }
    .adr-modal__close {
      width: 34px; height: 34px; border: none; background: none; cursor: pointer;
      color: var(--c-text-muted); border-radius: var(--r-sm);
      display: inline-flex; align-items: center; justify-content: center;
    }
    .adr-modal__close:hover { background: var(--c-bg); color: var(--c-text); }
    .adr-modal__close svg { width: 20px; height: 20px; }
    .adr-modal__body { padding: 20px; }
    .adr-modal__foot {
      display: flex; justify-content: flex-end; gap: 8px;
      padding: 14px 20px; border-top: 1px solid var(--c-border);
    }

    .adr-form { display: flex; flex-direction: column; gap: 14px; }
    .adr-form__grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .adr-fld { display: flex; flex-direction: column; }
    .adr-fld__label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 700; color: var(--c-text-sub); }
    .adr-fld__label .req { color: var(--c-danger); margin-left: 2px; }
    .adr-fld__row { display: flex; gap: 8px; }
    .adr-fld__row .adr-input { flex: 1; min-width: 0; }
    .adr-input {
      width: 100%; height: 44px; padding: 0 12px;
      font-family: inherit; font-size: var(--fs-body-sm); color: var(--c-text);
      background: #fff; border: 1px solid var(--c-border); border-radius: var(--r-sm); outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .adr-input:focus { border-color: var(--c-primary-500); box-shadow: 0 0 0 3px var(--c-primary-100); }
    .adr-input[readonly] { background: var(--c-bg); cursor: default; }
    .adr-fld__err { margin-top: 5px; font-size: 12px; color: var(--c-danger); display: none; }
    .adr-fld__err.is-show { display: block; }
    .adr-consent { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: var(--c-text-sub); line-height: 1.5; margin-top: 2px; }
    .adr-consent input { margin-top: 2px; flex: none; accent-color: var(--c-primary-500); }
    .adr-consent a { color: var(--c-primary-600); font-weight: 700; }

    /* ===== 토스트 ===== */
    .adr-toast {
      position: fixed; left: 50%; bottom: 32px; transform: translateX(-50%) translateY(12px);
      z-index: 1100; max-width: 90vw; padding: 12px 18px;
      background: var(--c-text); color: #fff; border-radius: var(--r-full);
      font-size: var(--fs-body-sm); font-weight: 600; box-shadow: 0 8px 24px rgba(17, 17, 17, .25);
      opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s;
    }
    .adr-toast.is-show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 767px) {
      .adr-wrap { padding: 24px var(--sp-4) 80px; }
      .adr-head { flex-direction: column; align-items: stretch; }
      .adr-form__grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="wz-body">
  <div id="wz-header"></div>

  <main>
    <div class="adr-wrap">
      <div class="adr-head">
        <div>
          <span class="adr-head__eyebrow">두띵 배송</span>
          <h1>배송지 관리</h1>
          <p class="adr-head__sub">굿즈를 받아볼 주소를 등록하고 관리하세요. 기본 배송지는 후원 결제 시 자동으로 선택됩니다.</p>
        </div>
        <button id="btnAdd" type="button" class="wz-btn wz-btn--primary" style="display:none;">배송지 추가</button>
      </div>

      <div id="adrList" class="adr-list">
        <div class="adr-loading">불러오는 중...</div>
      </div>
    </div>
  </main>

  <div id="wz-footer"></div>

  <script src="api.js"></script>
  <script src="categories.js"></script>
  <script src="category-icons.js"></script>
  <script src="wz-core.js"></script>
  <script src="addresses.js"></script>
</body>
</html>
