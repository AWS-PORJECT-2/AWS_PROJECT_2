<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>굿즈 펀딩 - 국민대학교</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .product-select-container {
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 0;
      width: 100%;
      max-width: 375px;
      min-height: 609px;
      margin: 0 auto;
      background: #ffffff;
      border: 0.75px solid #e5e7eb;
      box-shadow: 0px 0.75px 2.25px rgba(0, 0, 0, 0.1),
                  0px 0.75px 1.5px -0.75px rgba(0, 0, 0, 0.1);
      flex: none;
      flex-grow: 0;
    }
  </style>
  <link rel="stylesheet" href="main.css">
</head>
<body class="main-page" data-page="sub">
  <div id="app"></div>

  <div style="display:flex;flex-direction:column;align-items:flex-start;padding:0;width:100%;min-height:100vh;flex:none;z-index:2;">

  <main class="main-content" style="padding-bottom:80px;width:100%;">

    <!-- 헤더 -->

    <!-- 제품 선택 컨테이너 -->
    <div class="product-select-container">

      <!-- 안내 텍스트 -->
      <div style="width:100%;padding:24px 20px 16px;">
        <h2 style="font-size:20px;font-weight:800;color:#1a1a1a;">어떤 굿즈를 만들까요?</h2>
        <p style="font-size:14px;color:#9ca3af;margin-top:6px;">제작할 굿즈 종류를 선택해 주세요</p>
      </div>

      <!-- 제품 리스트 -->
      <div style="width:100%;padding:0 20px 20px;display:flex;flex-direction:column;gap:12px;">

        <button onclick="location.href='design-upload.html?category=과잠'" style="display:flex;align-items:center;gap:14px;padding:16px;border:1.5px solid #e5e7eb;border-radius:14px;background:#fff;cursor:pointer;transition:all 0.2s;width:100%;text-align:left;">
          <div style="width:48px;height:48px;border-radius:12px;background:#eff6ff;display:flex;align-items:center;justify-content:center;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.38 3.46L16 2 12 3.46 8 2 3.62 3.46a2 2 0 00-1.34 1.89v13.3a2 2 0 001.34 1.89L8 22l4-1.46L16 22l4.38-1.46a2 2 0 001.34-1.89V5.35a2 2 0 00-1.34-1.89z"/></svg>
          </div>
          <div style="flex:1;">
            <div style="font-size:15px;font-weight:600;color:#1a1a1a;">과잠</div>
            <div style="font-size:12px;color:#9ca3af;margin-top:2px;">대학 과잠바 · 사이즈 선택 가능</div>
          </div>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>

        <button onclick="location.href='design-upload.html?category=반팔티'" style="display:flex;align-items:center;gap:14px;padding:16px;border:1.5px solid #e5e7eb;border-radius:14px;background:#fff;cursor:pointer;transition:all 0.2s;width:100%;text-align:left;">
          <div style="width:48px;height:48px;border-radius:12px;background:#f0fdf4;display:flex;align-items:center;justify-content:center;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8l3-3 3 1a3 3 0 006 0l3-1 3 3-3 3v9H7v-9z"/></svg>
          </div>
          <div style="flex:1;">
            <div style="font-size:15px;font-weight:600;color:#1a1a1a;">반팔티</div>
            <div style="font-size:12px;color:#9ca3af;margin-top:2px;">라운드넥 반팔 · 사이즈 선택 가능</div>
          </div>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>

        <button onclick="location.href='design-upload.html?category=에코백'" style="display:flex;align-items:center;gap:14px;padding:16px;border:1.5px solid #e5e7eb;border-radius:14px;background:#fff;cursor:pointer;transition:all 0.2s;width:100%;text-align:left;">
          <div style="width:48px;height:48px;border-radius:12px;background:#fef3c7;display:flex;align-items:center;justify-content:center;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          </div>
          <div style="flex:1;">
            <div style="font-size:15px;font-weight:600;color:#1a1a1a;">에코백</div>
            <div style="font-size:12px;color:#9ca3af;margin-top:2px;">친환경 에코백 · 프리사이즈</div>
          </div>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>

      </div>
    </div>

  </main>

  </div>

  <script src="category-icons.js"></script>
  <script src="main.js"></script>
</body>
</html>
