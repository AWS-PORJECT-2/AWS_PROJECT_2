<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>설정 · 두띵</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="main.css">
  <script src="api.js"></script>
  <script src="categories.js"></script>
  <script src="notification.js"></script>
  <script src="search.js"></script>
  <script src="category-icons.js"></script>
  <script src="main.js"></script>
  <script src="settings.js" defer></script>
</head>
<body class="main-page" data-page="sub">
  <div id="app"></div>

  <main class="main-content" style="max-width:720px;padding:24px 20px 100px;">
    <h1 style="font-size:24px;font-weight:800;margin-bottom:18px;">설정</h1>

    <div id="setTabs" style="display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap;border-bottom:1px solid #eee;padding-bottom:14px;">
      <button class="set-tab" data-tab="profile">프로필</button>
      <button class="set-tab" data-tab="account">계정</button>
      <button class="set-tab" data-tab="payment">결제수단</button>
      <button class="set-tab" data-tab="address">배송지</button>
      <button class="set-tab" data-tab="noti">알림</button>
    </div>

    <section id="setProfile" class="set-pane"></section>
    <section id="setAccount" class="set-pane" style="display:none;"></section>
    <section id="setPayment" class="set-pane" style="display:none;"></section>
    <section id="setAddress" class="set-pane" style="display:none;"></section>
    <section id="setNoti" class="set-pane" style="display:none;"></section>
  </main>
</body>
</html>
