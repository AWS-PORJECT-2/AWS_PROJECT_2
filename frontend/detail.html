<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상품 상세 - doothing</title>
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="main.css">
  <link rel="stylesheet" href="detail.css">
</head>
<body class="main-page" data-page="detail">
  <div id="app"></div>

  <main class="detail-main">
    <!-- 메인 콘텐츠는 detail.js 가 렌더링 -->
    <div class="detail-container" id="detailContainer"></div>
  </main>

  <!-- 예약 확정 모달 -->
  <div class="modal-overlay" id="modalReservation" role="dialog" aria-modal="true" aria-labelledby="modalReservationTitle">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalReservationTitle">예약 확정</h2>
        <button class="modal-close" onclick="hideModal('modalReservation')" aria-label="닫기">&times;</button>
      </div>
      <div class="modal-body">
        <p>이 상품의 공동구매에 참여하시겠습니까?</p>
        <div id="sizeSelectionArea" style="margin-top:16px;"></div>
        <p class="modal-sub">참여 확정 후 정책 안내를 확인해 주세요.</p>
      </div>
      <div class="modal-actions">
        <button class="modal-btn-cancel" onclick="hideModal('modalReservation')">취소</button>
        <button class="modal-btn-confirm" onclick="handleReservationConfirm()">확인</button>
      </div>
    </div>
  </div>

  <!-- 정책 안내 모달 -->
  <div class="modal-overlay" id="modalPolicy" role="dialog" aria-modal="true" aria-labelledby="modalPolicyTitle">
    <div class="modal-content modal-policy">
      <div class="modal-header">
        <h2 id="modalPolicyTitle">정책 안내</h2>
        <button class="modal-close" onclick="hideModal('modalPolicy')" aria-label="닫기">&times;</button>
      </div>
      <div class="modal-body" id="policyBody"></div>
      <div class="modal-actions">
        <button class="modal-btn-cancel" onclick="hideModal('modalPolicy')">취소</button>
        <button class="modal-btn-confirm" onclick="handlePolicyAgree()">동의 후 참여</button>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="categories.js"></script>
  <script src="mock-data.js"></script>
  <script src="motion.js"></script>
  <script src="search.js"></script>
  <script src="notification.js"></script>
  <script src="category-icons.js"></script>
  <script src="main.js"></script>
  <script src="detail.js"></script>
</body>
</html>
