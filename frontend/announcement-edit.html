<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://fastly.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <title>공지사항 작성 · 두띵 관리자</title>
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="wz.css">
  <style>
    .ance-wrap { max-width: 760px; margin: 0 auto; padding: 32px var(--sp-6) 96px; }
    .ance-head { margin-bottom: 24px; }
    .ance-head__eyebrow {
      display: inline-block; margin-bottom: 10px; padding: 4px 12px;
      border-radius: var(--r-full); background: var(--c-primary-50);
      color: var(--c-primary-700); font-size: var(--fs-caption); font-weight: 700;
    }
    .ance-head h1 { margin: 0 0 6px; font-size: var(--fs-h1); font-weight: 800; color: var(--c-text); }
    .ance-head__sub { margin: 0; font-size: var(--fs-body-sm); color: var(--c-text-muted); }

    .ance-panel {
      background: #fff; border: 1px solid var(--c-border); border-radius: var(--r-md);
      box-shadow: var(--sh-1); padding: 24px;
    }
    .ance-field { margin-bottom: 20px; }
    .ance-field:last-child { margin-bottom: 0; }
    .ance-field label { display: block; font-size: var(--fs-body-sm); font-weight: 700; color: var(--c-text-sub); margin-bottom: 8px; }
    .ance-field input, .ance-field textarea {
      width: 100%; box-sizing: border-box; padding: 12px 14px;
      border: 1px solid var(--c-border); border-radius: var(--r-sm);
      font-family: inherit; font-size: var(--fs-body-sm); line-height: 1.7; color: var(--c-text);
      background: #fff; outline: none; transition: border-color .15s, box-shadow .15s;
    }
    .ance-field input:focus, .ance-field textarea:focus {
      border-color: var(--c-primary-500); box-shadow: 0 0 0 3px var(--c-primary-100);
    }
    .ance-field textarea { min-height: 360px; resize: vertical; }
    .ance-count { margin-top: 6px; text-align: right; font-size: var(--fs-caption); color: var(--c-text-faint); }

    .ance-actions { display: flex; justify-content: space-between; gap: 8px; margin-top: 20px; }

    .ance-state { padding: 56px 20px; text-align: center; font-size: var(--fs-body-sm); color: var(--c-text-muted); }
    .ance-state--error { color: var(--c-danger); }

    @media (max-width: 767px) { .ance-wrap { padding: 24px var(--sp-4) 80px; } }
  </style>
</head>
<body class="wz-body">
  <div id="wz-header"></div>

  <main>
    <div class="ance-wrap">
      <div class="ance-head">
        <span class="ance-head__eyebrow">관리자</span>
        <h1 id="pageTitle">공지사항 작성</h1>
        <p class="ance-head__sub">국민대학교 학생들에게 전달할 중요 안내를 작성하세요.</p>
      </div>

      <div id="root">
        <div class="ance-state">불러오는 중...</div>
      </div>
    </div>
  </main>

  <div id="wz-footer"></div>

  <script src="api.js"></script>
  <script src="categories.js"></script>
  <script src="category-icons.js"></script>
  <script src="wz-core.js"></script>
  <script src="announcement-edit.js"></script>
</body>
</html>
