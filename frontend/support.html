<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1:1 문의 - 두띵</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .chat-container {
      max-width: 600px;
      margin: 0 auto;
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column;
      background: #b2c7d9;
    }
    .chat-topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; background: #fff; border-bottom: 1px solid #e5e7eb;
    }
    .chat-topbar .back-btn {
      background: none; border: none; cursor: pointer; padding: 4px;
    }
    .chat-topbar h1 { font-size: 16px; font-weight: 700; color: #1a1a1a; flex: 1; }
    .chat-topbar .status {
      font-size: 11px; padding: 3px 8px; border-radius: 999px;
      background: #fef3c7; color: #92400e;
    }
    .chat-topbar .status.online { background: #dcfce7; color: #166534; }

    .chat-messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .msg-row { display: flex; align-items: flex-end; gap: 6px; }
    .msg-row.me { flex-direction: row-reverse; }
    .msg-bubble {
      max-width: 70%; padding: 10px 14px; border-radius: 16px;
      font-size: 14px; line-height: 1.5; word-break: break-word;
      white-space: pre-wrap;
    }
    .msg-row.admin .msg-bubble {
      background: #fff; color: #1a1a1a; border-bottom-left-radius: 4px;
    }
    .msg-row.me .msg-bubble {
      background: #fee500; color: #1a1a1a; border-bottom-right-radius: 4px;
    }
    .msg-time { font-size: 10px; color: #6b7280; white-space: nowrap; }

    .admin-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: #2563eb; color: #fff; font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; align-self: flex-start;
    }

    .chat-input {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; background: #fff; border-top: 1px solid #e5e7eb;
    }
    .chat-input input[type="text"] {
      flex: 1; padding: 10px 14px; border: 1px solid #e5e7eb; border-radius: 20px;
      font-size: 14px; outline: none;
    }
    .chat-input input:focus { border-color: #2563eb; }
    .chat-input button {
      width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-send { background: #fee500; }
    .btn-send:disabled { background: #d1d5db; cursor: not-allowed; }

    .day-divider {
      text-align: center; font-size: 11px; color: #6b7280;
      padding: 10px 0;
    }
    .system-msg {
      text-align: center; font-size: 12px; color: #6b7280;
      padding: 10px; background: rgba(255,255,255,0.5); border-radius: 12px;
      margin: 4px 20px;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-topbar">
      <button class="back-btn" aria-label="뒤로가기"
              onclick="if(history.length>1)history.back();else location.href='/index.html'">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <h1>1:1 문의</h1>
      <span id="connStatus" class="status">연결 중...</span>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="system-msg">대화 내역을 불러오는 중...</div>
    </div>
    <div class="chat-input">
      <input type="text" id="chatInput" placeholder="메시지를 입력하세요..." maxlength="2000" disabled>
      <button class="btn-send" id="btnSend" aria-label="전송" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="payment-api.js"></script>
  <script src="chat-user.js"></script>
</body>
</html>
