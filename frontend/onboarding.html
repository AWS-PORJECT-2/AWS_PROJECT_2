<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프로필 설정 · 두띵</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="main.css">
  <script src="api.js"></script>
  <script src="onboarding.js" defer></script>
</head>
<body class="main-page" data-page="sub">
  <main class="main-content" style="max-width:460px;padding:40px 24px 80px;">
    <h1 style="font-size:24px;font-weight:800;margin-bottom:6px;">환영합니다</h1>
    <p style="color:#6b7280;font-size:14px;margin-bottom:28px;">서비스 이용을 위해 간단한 정보를 입력해 주세요. 언제든 설정에서 수정할 수 있어요.</p>

    <form id="onboardForm" novalidate style="display:flex;flex-direction:column;gap:18px;">
      <label style="display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:600;color:#374151;">
        닉네임 <span style="color:#ef4444;">*</span>
        <input id="obNickname" type="text" maxlength="40" required placeholder="서비스에 표시될 이름"
               style="padding:12px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:15px;">
      </label>
      <label style="display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:600;color:#374151;">
        실명
        <input id="obRealName" type="text" maxlength="40" placeholder="배송·정산에 사용 (선택)"
               style="padding:12px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:15px;">
      </label>
      <label style="display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:600;color:#374151;">
        휴대폰 번호
        <input id="obPhone" type="tel" maxlength="20" placeholder="010-0000-0000 (선택)"
               style="padding:12px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:15px;">
      </label>
      <p id="obError" style="display:none;color:#ef4444;font-size:13px;"></p>
      <button type="submit" id="obSubmit"
              style="margin-top:8px;padding:14px;border:none;border-radius:12px;background:#8b5cf6;color:#fff;font-size:15px;font-weight:700;cursor:pointer;">시작하기</button>
    </form>
  </main>
</body>
</html>
