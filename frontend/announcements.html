<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light">
  <style>html,body{background:#fff}</style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://fastly.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <title>공지사항 · 두띵</title>
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="wz.css">
  <style>
    .anc-wrap { max-width: 880px; margin: 0 auto; padding: 32px var(--sp-6) 96px; }
    .anc-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 24px; }
    .anc-head__eyebrow {
      display: inline-block; margin-bottom: 10px; padding: 4px 12px;
      border-radius: var(--r-full); background: var(--c-primary-50);
      color: var(--c-primary-700); font-size: var(--fs-caption); font-weight: 700;
    }
    .anc-head h1 { margin: 0 0 6px; font-size: var(--fs-h1); font-weight: 800; color: var(--c-text); }
    .anc-head__sub { margin: 0; font-size: var(--fs-body-sm); color: var(--c-text-muted); }

    .anc-list { list-style: none; margin: 0; padding: 0; border-top: 2px solid var(--c-text); }
    .anc-item {
      display: block; padding: 20px 8px; border-bottom: 1px solid var(--c-border);
      cursor: pointer; transition: background .15s;
    }
    .anc-item:hover { background: var(--c-bg); }
    .anc-item__top { display: flex; align-items: baseline; gap: 10px; }
    .anc-item__no { flex: none; min-width: 28px; font-size: var(--fs-body-sm); font-weight: 700; color: var(--c-primary-600); }
    .anc-item__title {
      flex: 1; min-width: 0; font-size: var(--fs-body); font-weight: 700; color: var(--c-text);
      line-height: 1.45; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .anc-item__meta { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 8px; padding-left: 38px; font-size: var(--fs-caption); color: var(--c-text-muted); }
    .anc-item__meta span { display: inline-flex; align-items: center; gap: 5px; }
    .anc-item__meta svg { width: 14px; height: 14px; stroke: currentColor; }

    .anc-empty, .anc-error, .anc-loading {
      padding: 56px 20px; text-align: center; font-size: var(--fs-body-sm);
      color: var(--c-text-muted); border-bottom: 1px solid var(--c-border);
    }
    .anc-error { color: var(--c-danger); }

    .anc-pager { display: flex; justify-content: center; align-items: center; gap: 6px; margin-top: 28px; }
    .anc-pager__btn {
      min-width: 38px; height: 38px; padding: 0 8px; border-radius: var(--r-sm);
      background: #fff; border: 1px solid var(--c-border); cursor: pointer;
      font-family: inherit; font-size: var(--fs-body-sm); color: var(--c-text-sub);
      display: inline-flex; align-items: center; justify-content: center; transition: background .15s, border-color .15s, color .15s;
    }
    .anc-pager__btn:hover:not(:disabled) { border-color: var(--c-primary-400); color: var(--c-primary-600); }
    .anc-pager__btn.is-active { background: var(--c-primary-500); border-color: var(--c-primary-500); color: #fff; }
    .anc-pager__btn:disabled { opacity: .4; cursor: not-allowed; }
    .anc-pager__btn svg { width: 16px; height: 16px; stroke: currentColor; }

    @media (max-width: 767px) {
      .anc-wrap { padding: 24px var(--sp-4) 80px; }
      .anc-head { flex-direction: column; align-items: stretch; }
      .anc-item__meta span.anc-item__author { display: none; }
    }
  </style>
</head>
<body class="wz-body">
  <div id="wz-header"></div>

  <main>
    <div class="anc-wrap">
      <div class="anc-head">
        <div>
          <span class="anc-head__eyebrow">두띵 안내</span>
          <h1>공지사항</h1>
          <p class="anc-head__sub">펀딩 진행 상황과 중요 안내를 확인하세요.</p>
        </div>
        <a id="btnWrite" class="wz-btn wz-btn--primary" href="/announcement-edit.html" style="display:none;">글쓰기</a>
      </div>

      <ul class="anc-list" id="ancList">
        <li class="anc-loading">불러오는 중...</li>
      </ul>

      <div id="ancPager" class="anc-pager"></div>
    </div>
  </main>

  <div id="wz-footer"></div>

  <script src="api.js"></script>
  <script src="categories.js"></script>
  <script src="category-icons.js"></script>
  <script src="wz-core.js"></script>
  <script src="wz-i18n-dict.js"></script>
  <script src="wz-i18n.js"></script>
  <script src="announcements.js"></script>
</body>
</html>
