<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light">
  <style>html,body{background:#fff}</style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://fastly.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <title>공지사항 · 두띵</title>
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="wz.css">
  <link rel="stylesheet" href="wz-consent.css">
  <style>
    .anc-detail-body {
      margin: 22px 0 0; white-space: pre-wrap; word-break: break-word;
      font-size: var(--fs-body-sm); line-height: 1.9; color: var(--c-text-sub);
    }
    .anc-detail-meta { display: flex; flex-wrap: wrap; gap: 16px; }
    .anc-detail-actions {
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
      margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--c-divider);
    }
    .anc-detail-actions__group { display: flex; gap: 8px; }
    .anc-state { padding: 60px 20px; text-align: center; font-size: var(--fs-body-sm); color: var(--c-text-muted); }
    .anc-state--error { color: var(--c-danger); }
  </style>
</head>
<body class="wz-body">
  <div id="wz-header"></div>

  <main>
    <article class="wzc-doc" id="content">
      <div class="anc-state">불러오는 중...</div>
    </article>
  </main>

  <div id="wz-footer"></div>

  <script src="api.js"></script>
  <script src="categories.js"></script>
  <script src="category-icons.js"></script>
  <script src="wz-core.js"></script>
  <script src="announcement-detail.js"></script>
</body>
</html>
