<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>굿즈 펀딩 - 국민대학교</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="main.css">
  <style>
    body.main-page { background: var(--bg-page); }
    .ds-page {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 32px 80px;
      box-sizing: border-box;
    }
    .ds-header {
      text-align: center;
      margin-bottom: 48px;
      opacity: 0;
      transform: translateY(12px);
      animation: ds-fade-up 0.6s ease forwards;
    }
    .ds-header h2 {
      font-size: 32px;
      font-weight: 800;
      color: #1a1a1a;
      margin: 0;
    }
    .ds-header p {
      font-size: 16px;
      color: #6b7280;
      margin-top: 12px;
    }
    .ds-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .ds-card {
      background: #fff;
      border: 1.5px solid #e5e7eb;
      border-radius: 16px;
      padding: 36px 24px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      width: 100%;
      box-sizing: border-box;
      text-decoration: none;
      color: inherit;
      opacity: 0;
      transform: translateY(20px);
      animation: ds-fade-up 0.6s ease forwards;
    }
    .ds-card:nth-child(1) { animation-delay: 0.15s; }
    .ds-card:nth-child(2) { animation-delay: 0.3s; }
    .ds-card:nth-child(3) { animation-delay: 0.45s; }
    .ds-card:hover {
      border-color: #c7d2fe;
      background: #f5f6ff;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(99, 102, 241, 0.08);
    }
    .ds-card .title {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
    }
    .ds-card .desc {
      font-size: 13px;
      color: #9ca3af;
      line-height: 1.5;
    }
    @keyframes ds-fade-up {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @media (max-width: 900px) {
      .ds-page {
        padding: 24px 16px 60px;
      }
      .ds-header { text-align: left; margin-bottom: 24px; }
      .ds-header h2 { font-size: 22px; }
      .ds-header p { font-size: 14px; margin-top: 6px; }
      .ds-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .ds-card {
        flex-direction: row;
        align-items: center;
        text-align: left;
        padding: 18px 20px;
        gap: 14px;
        border-radius: 12px;
      }
      .ds-card .title { font-size: 15px; font-weight: 600; }
      .ds-card .desc { font-size: 12px; }
    }
  </style>
</head>
<body class="main-page" data-page="sub">
  <div id="app"></div>

  <main class="ds-page">
    <div class="ds-header">
      <h2>어떤 굿즈를 만들까요?</h2>
      <p>제작할 굿즈 종류를 선택해 주세요</p>
    </div>

    <div class="ds-grid">
      <a class="ds-card" href="fund-create.html?category=과잠">
        <div class="title">과잠</div>
        <div class="desc">대학 과잠바 · 사이즈 선택 가능</div>
      </a>

      <a class="ds-card" href="fund-create.html?category=반팔티">
        <div class="title">반팔티</div>
        <div class="desc">라운드넥 반팔 · 사이즈 선택 가능</div>
      </a>

      <a class="ds-card" href="fund-create.html?category=에코백">
        <div class="title">에코백</div>
        <div class="desc">친환경 에코백 · 프리사이즈</div>
      </a>
    </div>
  </main>

  <script src="category-icons.js"></script>
  <script src="main.js"></script>
</body>
</html>
