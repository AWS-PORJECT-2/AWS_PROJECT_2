<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>국민대학교 굿즈 펀딩</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== 데스크톱 사이드바 (768px 이상) ===== -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">🎓</span>
      <span class="logo-text">국민대학교</span>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="sidebar-item active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h1v7c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-7h1a1 1 0 00.7-1.7l-9-9a1 1 0 00-1.4 0l-9 9A1 1 0 003 13z"/></svg>
        <span>홈</span>
      </a>
      <a href="#" class="sidebar-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        <span>공동구매</span>
      </a>
      <a href="#" class="sidebar-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span>알림</span>
      </a>
    </nav>
    <div class="sidebar-bottom">
      <a href="#" class="sidebar-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>마이페이지</span>
      </a>
    </div>
  </aside>

  <!-- ===== 메인 콘텐츠 ===== -->
  <main class="main-content">

    <!-- 모바일 헤더 -->
    <header class="header mobile-only">
      <div class="header-left">
        <span class="school-name">국민대학교</span>
        <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="header-right">
        <button class="icon-btn" aria-label="검색">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        </button>
        <button class="icon-btn" aria-label="알림">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        </button>
      </div>
    </header>

    <!-- 데스크톱 상단바 -->
    <header class="desktop-topbar desktop-only">
      <div class="topbar-search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" placeholder="공동구매 검색..." class="search-input">
      </div>
      <div class="topbar-right">
        <button class="icon-btn" aria-label="알림">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        </button>
        <div class="topbar-profile">
          <img src="https://picsum.photos/seed/profile1/36/36" alt="프로필" class="topbar-avatar">
        </div>
      </div>
    </header>

    <!-- 히어로 배너 -->
    <section class="hero">
      <div class="hero-profile mobile-only">
        <img src="https://picsum.photos/seed/profile1/48/48" alt="프로필" class="profile-img">
      </div>
      <img src="https://picsum.photos/seed/hoodie/800/500" alt="과잠 배너" class="hero-image">
      <div class="hero-badge">
        <span class="badge-dot"></span>
        국민대학교 실시간 1위 과잠
      </div>
    </section>

    <!-- 메인 카피 + 액션 -->
    <section class="intro-section">
      <div class="main-copy">
        <h1>국민대학교만의<br>특별한 굿즈 펀딩</h1>
        <p class="sub-copy">우리 학교 트렌디한 아이템을 가장 먼저 만나보세요</p>
      </div>
      <div class="action-buttons">
        <button class="action-card">
          <div class="action-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          </div>
          <span>디자인 시작</span>
        </button>
        <button class="action-card">
          <div class="action-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
          </div>
          <span>공구 참여</span>
        </button>
      </div>
    </section>

    <!-- 실시간 펀딩 현황 -->
    <section class="funding-section">
      <div class="section-header">
        <div class="section-title-row">
          <h2>실시간 펀딩 현황</h2>
          <span class="tag-badge">국민대학교 전용</span>
        </div>
        <a href="#" class="view-all">전체보기</a>
      </div>
      <div class="card-grid" id="fundingCards"></div>
    </section>

  </main>

  <!-- 모바일 하단 네비게이션 -->
  <nav class="bottom-nav mobile-only">
    <a href="#" class="nav-item active">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h1v7c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-7h1a1 1 0 00.7-1.7l-9-9a1 1 0 00-1.4 0l-9 9A1 1 0 003 13z"/></svg>
      <span>홈</span>
    </a>
    <a href="#" class="nav-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      <span>공동구매</span>
    </a>
    <a href="#" class="nav-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      <span>알림</span>
    </a>
    <a href="#" class="nav-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>마이</span>
    </a>
  </nav>

  <script src="app.js"></script>
</body>
</html>
